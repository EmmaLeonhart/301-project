name: Run Pipeline

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:       # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python setup
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt

      # Run data acquisition + analysis (continue on failure so report still renders from existing data)
      - name: Acquire data
        run: python acquire.py 50
        continue-on-error: true

      # Commit data immediately so it is preserved even if later steps fail
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/
          git diff --staged --quiet || git commit -m "Pipeline run: update data $(date -u +%Y-%m-%d)"

      # Quarto setup + render
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Render report
        run: |
          quarto render reports/report.qmd --to html
          quarto render reports/report.qmd --to pdf
          cp reports/report.html docs/index.html
          cp reports/report.pdf docs/report.pdf

      # Commit report + push everything
      - name: Commit report and push
        run: |
          git add reports/ docs/
          git diff --staged --quiet || git commit -m "Pipeline run: update report $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
