name: Run Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:       # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python setup
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt

      # Run data acquisition + analysis
      - name: Acquire data
        run: python acquire.py 50

      # Quarto setup + render PDF
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Install R
        uses: r-lib/actions/setup-r@v2
      - name: Install R packages
        run: |
          Rscript -e 'install.packages("ggplot2", repos = "https://cloud.r-project.org")'
      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Render report
        run: |
          quarto render reports/report.qmd --to pdf
          cp reports/report.pdf docs/report.pdf

      # Commit updated data + report
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/ docs/
          git diff --staged --quiet || git commit -m "Pipeline run: update data and report $(date -u +%Y-%m-%d)"
          git push
