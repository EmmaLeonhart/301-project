name: Run Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6:00 UTC
  workflow_dispatch:       # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python setup
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt

      # Run data acquisition + analysis (continue on failure so report still renders from existing data)
      - name: Acquire data
        run: python acquire.py 50
        continue-on-error: true

      # Commit data immediately so it is preserved even if later steps fail
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Pipeline run: update data $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi

      # Generate PDF + HTML report with pure Python/matplotlib
      - name: Generate report
        run: python reports/generate_report.py

      - name: Copy PDF to docs
        run: cp reports/report.pdf docs/report.pdf

      # Commit report + push
      - name: Commit report and push
        run: |
          git add reports/report.pdf docs/
          if ! git diff --staged --quiet; then
            git commit -m "Pipeline run: update report $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
